version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: edgecloud_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edgecloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edgecloud}
      POSTGRES_DB: ${POSTGRES_DB:-edgecloud}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: edgecloud_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edgecloud_backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-edgecloud}:${POSTGRES_PASSWORD:-edgecloud}@db:5432/${POSTGRES_DB:-edgecloud}
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edgecloud_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
